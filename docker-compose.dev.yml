services:
  database:
    image: postgres:17-alpine
    container_name: pizzalab-database
    environment:
      POSTGRES_DB: pizzalab
      POSTGRES_USER: pizzalab
      POSTGRES_PASSWORD: pizzalab
    ports:
      - "5432:5432"
    volumes:
      - pizzalab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizzalab -d pizzalab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pizzalab-postgres-data:
